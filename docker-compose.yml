services:
  frontend:
    build:
      context: .
    container_name: resale_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-https://php-api-production-9e90.up.railway.app/api}
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    restart: unless-stopped

  wordpress_db:
    image: mysql:8.0
    container_name: resale_wordpress_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wp_data
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - wordpress_db_data:/var/lib/mysql

  wordpress:
    image: nikolail/resells:latest
    container_name: resale_wordpress
    depends_on:
      - wordpress_db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: wordpress_db:3306
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: wp_data
    restart: unless-stopped

volumes:
  wordpress_db_data:
